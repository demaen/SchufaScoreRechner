<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#0d1220"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#c8993a" stroke-width="18" opacity="0.3"/>
  <!-- Score arc (about 75% filled) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#c8993a" stroke-width="18"
    stroke-dasharray="754" stroke-dashoffset="188"
    stroke-linecap="round" transform="rotate(-90 256 256)"/>
  <!-- Inner card -->
  <rect x="148" y="178" width="216" height="156" rx="20" fill="#111928" stroke="#c8993a" stroke-width="3" opacity="0.9"/>
  <!-- S letterform -->
  <text x="256" y="298" font-size="120" text-anchor="middle" fill="#c8993a"
    font-family="Georgia, serif" font-weight="bold">S</text>
  <!-- Bottom label dots -->
  <circle cx="222" cy="364" r="8" fill="#c8993a" opacity="0.9"/>
  <circle cx="256" cy="364" r="8" fill="#c8993a" opacity="0.5"/>
  <circle cx="290" cy="364" r="8" fill="#c8993a" opacity="0.25"/>
</svg>
